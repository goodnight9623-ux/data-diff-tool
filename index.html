<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Diff</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #22263a;
  --border: #2e3248;
  --text: #e2e4f0;
  --muted: #7a7f9a;
  --old: #e05c6a;
  --new: #4a9eff;
  --accent: #7c6fff;
  --add: #3ecf8e;
  --mod: #f5a623;
  --del: #e05c6a;
  --same: #7a7f9a;
  --radius: 8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
a{color:var(--accent)}
/* ---- HEADER ---- */
.header{padding:18px 32px;display:flex;align-items:center;justify-content:space-between;gap:16px;background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.header-left{display:flex;align-items:center;gap:14px}
.header-logo{width:36px;height:36px;border-radius:9px;background:linear-gradient(135deg,var(--old) 0%,var(--accent) 55%,var(--new) 100%);flex-shrink:0;box-shadow:0 2px 6px rgba(0,0,0,.25)}
.header h1{font-size:18px;font-weight:700;letter-spacing:-.3px;color:#fff;margin:0}
.header-mode-badge{display:inline-block;background:var(--accent);color:#fff;font-size:10px;font-weight:800;letter-spacing:1px;padding:4px 11px;border-radius:999px;text-transform:uppercase}
.header-right{color:var(--muted);font-size:12px;letter-spacing:.5px;font-weight:500}
.header-right span{margin:0 4px}
/* ---- MODE TOGGLE ---- */
.mode-toggle{display:flex;gap:0;background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:3px;margin:20px 32px 0;width:fit-content}
.mode-btn{padding:7px 22px;border-radius:999px;border:none;background:transparent;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.mode-btn.active{background:var(--accent);color:#fff}
/* ---- MAIN CONTENT ---- */
.content{padding:24px 32px 48px;max-width:1400px}
.section{transition:opacity .25s,transform .25s}
.section.hidden{display:none}
/* ---- ZONES ---- */
.zones{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.zone{border:2px dashed var(--border);border-radius:var(--radius);padding:28px 20px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;position:relative;background:var(--surface)}
.zone:hover,.zone.drag-over{background:var(--surface2)}
.zone.old-zone{border-color:color-mix(in srgb,var(--old) 40%,transparent)}
.zone.new-zone{border-color:color-mix(in srgb,var(--new) 40%,transparent)}
.zone.old-zone:hover,.zone.old-zone.drag-over{border-color:var(--old)}
.zone.new-zone:hover,.zone.new-zone.drag-over{border-color:var(--new)}
.zone.loaded{background:var(--surface2)}
.zone-icon{font-size:28px;margin-bottom:10px;line-height:1}
.zone-label{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.zone-label.old{color:var(--old)}
.zone-label.new{color:var(--new)}
.zone-hint{color:var(--muted);font-size:12px}
.zone-info{margin-top:10px;font-size:12px;color:var(--text)}
.zone-info .fname{font-weight:700;font-size:13px;word-break:break-all}
.zone-info .fmeta{color:var(--muted);margin-top:3px}
input[type=file]{display:none}
/* ---- OPTIONS ---- */
.options-bar{display:flex;align-items:center;gap:20px;flex-wrap:wrap;padding:14px 18px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:20px}
.opt-group{display:flex;align-items:center;gap:8px}
.opt-group label{color:var(--muted);font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px}
.opt-group input[type=checkbox]{accent-color:var(--accent);cursor:pointer}
.opt-group input[type=text]{background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:4px 8px;font-size:12px;width:160px}
.opt-group input[type=text]:focus{outline:none;border-color:var(--accent)}
/* ---- BUTTONS ---- */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:var(--radius);border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{filter:brightness(1.15)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--surface2);color:var(--text)}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:6px}
.btn-danger{background:color-mix(in srgb,var(--del) 15%,transparent);color:var(--del);border:1px solid color-mix(in srgb,var(--del) 30%,transparent)}
.btn-danger:hover{background:color-mix(in srgb,var(--del) 25%,transparent)}
.btn-success{background:color-mix(in srgb,var(--add) 15%,transparent);color:var(--add);border:1px solid color-mix(in srgb,var(--add) 30%,transparent)}
.btn-success:hover{background:color-mix(in srgb,var(--add) 25%,transparent)}
.btn-blue{background:color-mix(in srgb,var(--new) 15%,transparent);color:var(--new);border:1px solid color-mix(in srgb,var(--new) 30%,transparent)}
.btn-blue:hover{background:color-mix(in srgb,var(--new) 25%,transparent)}
.btn-accent{background:color-mix(in srgb,var(--accent) 15%,transparent);color:var(--accent);border:1px solid color-mix(in srgb,var(--accent) 30%,transparent)}
.btn-accent:hover{background:color-mix(in srgb,var(--accent) 25%,transparent)}
.action-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:20px}
/* ---- SCHEMA CHIPS ---- */
.schema-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600;border:1px solid transparent}
.chip-same{background:color-mix(in srgb,var(--same) 15%,transparent);color:var(--same);border-color:color-mix(in srgb,var(--same) 30%,transparent)}
.chip-add{background:color-mix(in srgb,var(--add) 15%,transparent);color:var(--add);border-color:color-mix(in srgb,var(--add) 30%,transparent)}
.chip-del{background:color-mix(in srgb,var(--del) 15%,transparent);color:var(--del);border-color:color-mix(in srgb,var(--del) 30%,transparent)}
/* ---- SUMMARY BADGES ---- */
.summary-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.badge{padding:6px 14px;border-radius:var(--radius);font-size:12px;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:1px;min-width:72px}
.badge span{font-size:20px;line-height:1.1}
.badge-add{background:color-mix(in srgb,var(--add) 12%,transparent);color:var(--add);border:1px solid color-mix(in srgb,var(--add) 25%,transparent)}
.badge-del{background:color-mix(in srgb,var(--del) 12%,transparent);color:var(--del);border:1px solid color-mix(in srgb,var(--del) 25%,transparent)}
.badge-mod{background:color-mix(in srgb,var(--mod) 12%,transparent);color:var(--mod);border:1px solid color-mix(in srgb,var(--mod) 25%,transparent)}
.badge-same{background:color-mix(in srgb,var(--same) 12%,transparent);color:var(--same);border:1px solid color-mix(in srgb,var(--same) 20%,transparent)}
.badge-col{background:color-mix(in srgb,var(--accent) 12%,transparent);color:var(--accent);border:1px solid color-mix(in srgb,var(--accent) 25%,transparent)}
/* ---- FILTER BAR ---- */
.filter-bar{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.filter-bar select,.filter-bar input[type=text]{background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:6px 10px;font-size:12px}
.filter-bar select:focus,.filter-bar input[type=text]:focus{outline:none;border-color:var(--accent)}
/* ---- DIFF TABLE ---- */
.table-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{background:var(--surface2);position:sticky;top:0;z-index:2}
th{padding:8px 12px;text-align:left;color:var(--muted);font-weight:600;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:6px 12px;border-bottom:1px solid color-mix(in srgb,var(--border) 50%,transparent);vertical-align:top;max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr.row-add td:first-child{border-left:3px solid var(--add)}
tr.row-del td:first-child{border-left:3px solid var(--del)}
tr.row-mod td:first-child{border-left:3px solid var(--mod)}
tr.row-same td:first-child{border-left:3px solid transparent}
td.cell-mod{background:color-mix(in srgb,var(--mod) 8%,transparent)}
.cell-old{color:var(--old);text-decoration:line-through;font-size:11px;display:block}
.cell-new{color:var(--new);font-size:11px;display:block}
.row-type-badge{display:inline-block;padding:1px 7px;border-radius:999px;font-size:10px;font-weight:700}
.rtb-add{background:color-mix(in srgb,var(--add) 15%,transparent);color:var(--add)}
.rtb-del{background:color-mix(in srgb,var(--del) 15%,transparent);color:var(--del)}
.rtb-mod{background:color-mix(in srgb,var(--mod) 15%,transparent);color:var(--mod)}
.rtb-same{background:color-mix(in srgb,var(--same) 15%,transparent);color:var(--same)}
/* ---- FOLDER SECTION ---- */
.folder-zones{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.folder-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:24px 20px;cursor:pointer;transition:border-color .2s,background .2s;background:var(--surface);position:relative}
.folder-zone:hover,.folder-zone.drag-over{background:var(--surface2)}
.folder-zone.old-zone{border-color:color-mix(in srgb,var(--old) 40%,transparent)}
.folder-zone.new-zone{border-color:color-mix(in srgb,var(--new) 40%,transparent)}
.folder-zone.old-zone:hover,.folder-zone.old-zone.drag-over{border-color:var(--old)}
.folder-zone.new-zone:hover,.folder-zone.new-zone.drag-over{border-color:var(--new)}
.folder-zone.loaded{background:var(--surface2)}
.folder-zone-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.folder-icon{width:40px;height:40px;flex-shrink:0}
.folder-zone-title{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.folder-zone-title.old{color:var(--old)}
.folder-zone-title.new{color:var(--new)}
.folder-zone-hint{color:var(--muted);font-size:12px;margin-top:6px}
.folder-zone-info .fname{font-weight:700;font-size:14px;word-break:break-all}
.folder-zone-info .fmeta{color:var(--muted);font-size:12px;margin-top:4px}
/* ---- PAIR LIST ---- */
.pair-list-header{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.pair-list-header h2{font-size:15px;font-weight:700;flex:1}
.search-input{background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:7px 12px;font-size:12px;width:180px}
.search-input:focus{outline:none;border-color:var(--accent)}
.pair-table-wrap{border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;margin-bottom:20px}
.pair-table{width:100%;border-collapse:collapse;font-size:12px}
.pair-table th{padding:9px 12px;text-align:left;color:var(--muted);font-weight:600;background:var(--surface2);border-bottom:1px solid var(--border);white-space:nowrap}
.pair-table td{padding:8px 12px;border-bottom:1px solid color-mix(in srgb,var(--border) 50%,transparent);vertical-align:middle}
.pair-table tr:last-child td{border-bottom:none}
.pair-table tr.pair-row{cursor:pointer;transition:background .15s}
.pair-table tr.pair-row:hover{background:var(--surface2)}
.pair-table tr.pair-row.active-row{background:color-mix(in srgb,var(--accent) 10%,transparent)}
.status-badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:700}
.sb-pair{background:color-mix(in srgb,var(--add) 15%,transparent);color:var(--add)}
.sb-oldonly{background:color-mix(in srgb,var(--del) 15%,transparent);color:var(--del)}
.sb-newonly{background:color-mix(in srgb,var(--new) 15%,transparent);color:var(--new)}
.sb-unsupported{background:color-mix(in srgb,var(--muted) 15%,transparent);color:var(--muted)}
.result-mini{display:flex;gap:4px;flex-wrap:wrap}
.result-mini .rm{display:inline-block;padding:1px 6px;border-radius:999px;font-size:10px;font-weight:700}
.rm-add{background:color-mix(in srgb,var(--add) 15%,transparent);color:var(--add)}
.rm-del{background:color-mix(in srgb,var(--del) 15%,transparent);color:var(--del)}
.rm-mod{background:color-mix(in srgb,var(--mod) 15%,transparent);color:var(--mod)}
.rm-same{background:color-mix(in srgb,var(--same) 15%,transparent);color:var(--same)}
.group-header{background:var(--surface);padding:8px 14px;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.5px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;display:flex;align-items:center;gap:8px}
.group-header:hover{background:var(--surface2)}
/* ---- PROGRESS ---- */
.progress-bar-wrap{margin-bottom:20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.progress-label{font-size:13px;color:var(--text);margin-bottom:10px;display:flex;align-items:center;gap:10px}
.progress-bar-bg{background:var(--border);border-radius:999px;height:6px;width:100%;overflow:hidden}
.progress-bar-fill{height:6px;border-radius:999px;background:var(--accent);transition:width .3s}
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
/* ---- DIFF PANEL ---- */
.diff-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-top:4px}
.diff-panel-nav{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.diff-panel-title{font-size:14px;font-weight:700;flex:1;color:var(--text)}
/* ---- TOAST ---- */
#toast-container{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:8px;z-index:9999}
.toast{padding:12px 18px;border-radius:var(--radius);font-size:13px;font-weight:500;max-width:360px;animation:slideIn .25s ease;pointer-events:none;backdrop-filter:blur(8px)}
.toast-info{background:color-mix(in srgb,var(--accent) 25%,var(--surface));border:1px solid var(--accent);color:var(--text)}
.toast-success{background:color-mix(in srgb,var(--add) 20%,var(--surface));border:1px solid var(--add);color:var(--text)}
.toast-warn{background:color-mix(in srgb,var(--mod) 20%,var(--surface));border:1px solid var(--mod);color:var(--text)}
.toast-error{background:color-mix(in srgb,var(--del) 20%,var(--surface));border:1px solid var(--del);color:var(--text)}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
/* ---- EMPTY ---- */
.empty-state{text-align:center;padding:48px 20px;color:var(--muted)}
.empty-state h3{font-size:16px;font-weight:600;margin-bottom:8px;color:var(--text)}
/* ---- RESULT ---- */
#result{margin-top:4px}
.section-title{font-size:13px;font-weight:700;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px}
hr.divider{border:none;border-top:1px solid var(--border);margin:20px 0}
/* ---- PAGINATION ---- */
.pagination{display:flex;align-items:center;gap:8px;margin-top:12px;justify-content:flex-end}
.page-info{color:var(--muted);font-size:12px}
@media(max-width:640px){
  .zones,.folder-zones{grid-template-columns:1fr}
  .header{padding:16px}
  .content{padding:16px 16px 48px}
  .mode-toggle{margin:16px}
}
</style>
</head>
<body>
<header class="header">
  <div class="header-left">
    <div class="header-logo"></div>
    <h1>Data Diff</h1>
    <span class="header-mode-badge" id="header-mode-badge">SINGLE</span>
  </div>
  <div class="header-right">CSV<span>/</span>TSV<span>/</span>XLSX</div>
</header>
<div class="mode-toggle">
  <button class="mode-btn active" id="btn-mode-single" onclick="setMode('single')">단일 파일</button>
  <button class="mode-btn" id="btn-mode-folder" onclick="setMode('folder')">폴더</button>
</div>
<div class="content">

<!-- ===== SINGLE MODE ===== -->
<div id="section-single" class="section">
  <div class="zones">
    <div class="zone old-zone" id="zone-old" ondragover="onDragOver(event,'zone-old')" ondragleave="onDragLeave('zone-old')" ondrop="onDrop(event,'old')">
      <input type="file" id="file-old" accept=".csv,.tsv,.xlsx,.xls" onchange="handleFileInput(event,'old')">
      <div class="zone-icon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#e05c6a" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      </div>
      <div class="zone-label old">OLD 파일</div>
      <div class="zone-hint" id="hint-old">클릭하거나 파일을 드롭하세요</div>
      <div class="zone-info" id="info-old"></div>
    </div>
    <div class="zone new-zone" id="zone-new" ondragover="onDragOver(event,'zone-new')" ondragleave="onDragLeave('zone-new')" ondrop="onDrop(event,'new')">
      <input type="file" id="file-new" accept=".csv,.tsv,.xlsx,.xls" onchange="handleFileInput(event,'new')">
      <div class="zone-icon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#4a9eff" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      </div>
      <div class="zone-label new">NEW 파일</div>
      <div class="zone-hint" id="hint-new">클릭하거나 파일을 드롭하세요</div>
      <div class="zone-info" id="info-new"></div>
    </div>
  </div>
  <div class="options-bar">
    <div class="opt-group">
      <label><input type="checkbox" id="opt-case"> 대소문자 무시</label>
    </div>
    <div class="opt-group">
      <label><input type="checkbox" id="opt-trim" checked> 공백 무시</label>
    </div>
    <div class="opt-group">
      <label><input type="checkbox" id="opt-same"> 동일 행 표시</label>
    </div>
    <div class="opt-group">
      <label for="opt-pk">PK 컬럼:</label>
      <input type="text" id="opt-pk" placeholder="col1,col2 (비워두면 순서 기반)">
    </div>
  </div>
  <div class="action-row">
    <button class="btn btn-primary" id="btn-run" onclick="runDiff()" disabled>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      Diff 실행
    </button>
    <button class="btn btn-ghost btn-sm" onclick="loadSample()">샘플 데이터</button>
    <button class="btn btn-ghost btn-sm" onclick="resetAll()">초기화</button>
  </div>
  <div id="result"></div>
</div>

<!-- ===== FOLDER MODE ===== -->
<div id="section-folder" class="section hidden">
  <div class="folder-zones">
    <div class="folder-zone old-zone" id="fzone-old" ondragover="onFolderDragOver(event,'fzone-old')" ondragleave="onFolderDragLeave('fzone-old')" ondrop="onFolderDrop(event,'old')" onclick="document.getElementById('ffile-old').click()">
      <input type="file" id="ffile-old" webkitdirectory directory multiple onchange="handleFolderInput(event,'old')">
      <div class="folder-zone-header">
        <svg class="folder-icon" viewBox="0 0 40 40" fill="none">
          <path d="M4 10C4 8.34 5.34 7 7 7H16L20 11H33C34.66 11 36 12.34 36 14V30C36 31.66 34.66 33 33 33H7C5.34 33 4 31.66 4 30V10Z" fill="#e05c6a" opacity=".18" stroke="#e05c6a" stroke-width="1.5"/>
          <path d="M4 16H36V30C36 31.66 34.66 33 33 33H7C5.34 33 4 31.66 4 30V16Z" fill="#e05c6a" opacity=".22"/>
        </svg>
        <div>
          <div class="folder-zone-title old">OLD 폴더</div>
          <div class="folder-zone-hint" id="fhint-old">클릭 또는 폴더 드롭</div>
        </div>
      </div>
      <div id="finfo-old"></div>
    </div>
    <div class="folder-zone new-zone" id="fzone-new" ondragover="onFolderDragOver(event,'fzone-new')" ondragleave="onFolderDragLeave('fzone-new')" ondrop="onFolderDrop(event,'new')" onclick="document.getElementById('ffile-new').click()">
      <input type="file" id="ffile-new" webkitdirectory directory multiple onchange="handleFolderInput(event,'new')">
      <div class="folder-zone-header">
        <svg class="folder-icon" viewBox="0 0 40 40" fill="none">

<script>
// ============================================================
//  STATE
// ============================================================
const state = {
  single: { old: null, new: null },
  folder: {
    old: { name: '', files: new Map() },
    new: { name: '', files: new Map() },
    pairs: []
  },
  currentMode: 'single',
  activePairIndex: -1
};

const SUPPORTED_EXT = ['.csv','.tsv','.xlsx','.xls'];
const MAX_FOLDER_FILES = 200;
const PAGE_SIZE = 5000;

// ============================================================
//  MODE SWITCH
// ============================================================
function setMode(mode) {
  state.currentMode = mode;
  document.getElementById('btn-mode-single').classList.toggle('active', mode === 'single');
  document.getElementById('btn-mode-folder').classList.toggle('active', mode === 'folder');
  document.getElementById('section-single').classList.toggle('hidden', mode !== 'single');
  document.getElementById('section-folder').classList.toggle('hidden', mode !== 'folder');
  const badge = document.getElementById('header-mode-badge');
  if (badge) badge.textContent = mode === 'folder' ? 'FOLDER' : 'SINGLE';
}

// ============================================================
//  TOAST
// ============================================================
function toast(msg, type='info', dur=3200) {
  const c = document.getElementById('toast-container');
  const d = document.createElement('div');
  d.className = `toast toast-${type}`;
  d.textContent = msg;
  c.appendChild(d);
  setTimeout(() => { d.style.opacity='0'; d.style.transition='opacity .3s'; setTimeout(()=>d.remove(),300); }, dur);
}

// ============================================================
//  FORMAT HELPERS
// ============================================================
function fmtSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/1048576).toFixed(1) + ' MB';
}
function fmtNum(n) { return n == null ? '—' : n.toLocaleString(); }
function totalSize(map) { let s=0; map.forEach(f=>s+=f.size); return s; }
function extOf(name) { return name.slice(name.lastIndexOf('.')).toLowerCase(); }
function isSupported(name) { return SUPPORTED_EXT.includes(extOf(name)); }
function sanitizeSheetName(name) {
  return name.replace(/[\\\/\?\*\[\]:]/g,'_').slice(0,31);
}
function dedupeSheetName(name, used) {
  let n = name, i = 1;
  while (used.has(n)) { n = name.slice(0,28)+'_'+i++; }
  used.add(n);
  return n;
}

// ============================================================
//  PARSE FILE (Promise-based, shared)
// ============================================================
function parseFile(file) {
  return new Promise((resolve, reject) => {
    const ext = extOf(file.name);
    if (ext === '.xlsx' || ext === '.xls') {
      const reader = new FileReader();
      reader.onload = e => {
        try {
          const wb = XLSX.read(e.target.result, { type:'array' });
          const ws = wb.Sheets[wb.SheetNames[0]];
          const rows = XLSX.utils.sheet_to_json(ws, { defval:'' });
          resolve(rows);
        } catch(err) { reject(err); }
      };
      reader.onerror = reject;
      reader.readAsArrayBuffer(file);
    } else {
      const reader = new FileReader();
      reader.onload = e => {
        const delim = ext === '.tsv' ? '\t' : undefined;
        const result = Papa.parse(e.target.result, {
          header: true,
          skipEmptyLines: true,
          delimiter: delim
        });
        resolve(result.data);
      };
      reader.onerror = reject;
      reader.readAsText(file);
    }
  });
}

// ============================================================
//  DIFF ENGINE
// ============================================================
function getOptions(prefix) {
  const p = prefix || '';
  return {
    caseInsensitive: document.getElementById(p+'opt-case').checked,
    trim: document.getElementById(p+'opt-trim').checked,
    showSame: document.getElementById(p+'opt-same').checked,
    pk: document.getElementById(p+'opt-pk').value.split(',').map(s=>s.trim()).filter(Boolean)
  };
}

function normalizeVal(v, opts) {
  let s = String(v == null ? '' : v);
  if (opts.trim) s = s.trim();
  if (opts.caseInsensitive) s = s.toLowerCase();
  return s;
}

function computeDiff(oldRows, newRows, opts) {
  const oldCols = oldRows.length ? Object.keys(oldRows[0]) : [];
  const newCols = newRows.length ? Object.keys(newRows[0]) : [];
  const allCols = [...new Set([...oldCols,...newCols])];
  const addedCols = newCols.filter(c=>!oldCols.includes(c));
  const removedCols = oldCols.filter(c=>!newCols.includes(c));
  const sameCols = allCols.filter(c=>oldCols.includes(c)&&newCols.includes(c));

  function rowKey(row, cols) {
    if (cols.length) return cols.map(c=>normalizeVal(row[c]||'',opts)).join('|||');
    return allCols.map(c=>normalizeVal(row[c]||'',opts)).join('|||');
  }

  const pkCols = opts.pk.length ? opts.pk : null;
  const diffRows = [];

  if (pkCols) {
    const oldMap = new Map();
    oldRows.forEach(r=>{ const k=rowKey(r,pkCols); oldMap.set(k,r); });
    const newMap = new Map();
    newRows.forEach(r=>{ const k=rowKey(r,pkCols); newMap.set(k,r); });
    const allKeys = [...new Set([...oldMap.keys(),...newMap.keys()])];
    allKeys.forEach(k=>{
      const or=oldMap.get(k), nr=newMap.get(k);
      if (!or) { diffRows.push({type:'add',old:null,new:nr,modCols:[]}); return; }
      if (!nr) { diffRows.push({type:'del',old:or,new:null,modCols:[]}); return; }
      const modCols=allCols.filter(c=>normalizeVal(or[c]||'',opts)!==normalizeVal(nr[c]||'',opts));
      if (modCols.length) diffRows.push({type:'mod',old:or,new:nr,modCols});
      else diffRows.push({type:'same',old:or,new:nr,modCols:[]});
    });
  } else {
    const maxLen = Math.max(oldRows.length, newRows.length);
    for (let i=0;i<maxLen;i++) {
      const or=oldRows[i], nr=newRows[i];
      if (!or) { diffRows.push({type:'add',old:null,new:nr,modCols:[]}); continue; }
      if (!nr) { diffRows.push({type:'del',old:or,new:null,modCols:[]}); continue; }
      const modCols=allCols.filter(c=>normalizeVal(or[c]||'',opts)!==normalizeVal(nr[c]||'',opts));
      if (modCols.length) diffRows.push({type:'mod',old:or,new:nr,modCols});
      else diffRows.push({type:'same',old:or,new:nr,modCols:[]});
    }
  }

  const counts = { add:0, del:0, mod:0, same:0 };
  diffRows.forEach(r=>counts[r.type]++);
  return { diffRows, allCols, oldCols, newCols, addedCols, removedCols, sameCols, counts };
}

// ============================================================
//  RENDER HELPERS
// ============================================================
function renderSchema(allCols, addedCols, removedCols, container) {
  const row = document.createElement('div');
  row.className = 'schema-row';
  allCols.forEach(c => {
    const chip = document.createElement('span');
    if (addedCols.includes(c)) chip.className='chip chip-add';
    else if (removedCols.includes(c)) chip.className='chip chip-del';
    else chip.className='chip chip-same';
    chip.textContent = c;
    row.appendChild(chip);
  });
  container.appendChild(row);
}

function renderSummary(counts, addedCols, removedCols, container) {
  const row = document.createElement('div');
  row.className = 'summary-row';
  const items = [
    {cls:'badge-add',label:'추가',val:counts.add},
    {cls:'badge-del',label:'삭제',val:counts.del},
    {cls:'badge-mod',label:'변경',val:counts.mod},
    {cls:'badge-same',label:'동일',val:counts.same},
    {cls:'badge-col',label:'컬럼 Diff',val:addedCols.length+removedCols.length}
  ];
  items.forEach(i=>{
    const b=document.createElement('div');
    b.className='badge '+i.cls;
    b.innerHTML=`<span>${fmtNum(i.val)}</span>${i.label}`;
    row.appendChild(b);
  });
  container.appendChild(row);
}

function renderTable(diffResult, opts, container) {
  const { diffRows, allCols } = diffResult;
  const filter = container._filter || 'all';
  const search = container._search || '';

  // filter bar
  const fb = document.createElement('div');
  fb.className = 'filter-bar';
  const sel = document.createElement('select');
  ['all','add','del','mod','same'].forEach(v=>{
    const o=document.createElement('option');
    o.value=v; o.textContent={all:'전체',add:'추가',del:'삭제',mod:'변경',same:'동일'}[v];
    if(v===filter) o.selected=true;
    sel.appendChild(o);
  });
  sel.onchange = () => { container._filter=sel.value; renderTable(diffResult,opts,container); };
  const si = document.createElement('input');
  si.type='text'; si.placeholder='값 검색...'; si.value=search;
  si.style.cssText='background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:6px 10px;font-size:12px;';
  si.oninput = () => { container._search=si.value; renderTable(diffResult,opts,container); };
  const lbl = document.createElement('span');
  lbl.style.cssText='color:var(--muted);font-size:12px;margin-left:auto';
  fb.appendChild(sel); fb.appendChild(si); fb.appendChild(lbl);

  let rows = diffRows.filter(r => filter==='all' || r.type===filter);
  if (!opts.showSame) rows = rows.filter(r=>r.type!=='same');
  if (search) {
    const q=search.toLowerCase();
    rows = rows.filter(r=>{
      const obj=r.new||r.old||{};
      return allCols.some(c=>String(obj[c]||'').toLowerCase().includes(q));
    });
  }
  lbl.textContent = rows.length.toLocaleString()+'행';

  const tw = document.createElement('div');
  tw.className='table-wrap';
  const tbl = document.createElement('table');
  const thead = document.createElement('thead');
  const htr = document.createElement('tr');
  ['#','타입',...allCols].forEach(h=>{
    const th=document.createElement('th'); th.textContent=h; htr.appendChild(th);
  });
  thead.appendChild(htr); tbl.appendChild(thead);
  const tbody = document.createElement('tbody');
  rows.slice(0, PAGE_SIZE).forEach((r,i)=>{
    const obj=r.new||r.old||{};
    const tr=document.createElement('tr');
    tr.className='row-'+r.type;
    const td0=document.createElement('td'); td0.textContent=i+1; tr.appendChild(td0);
    const td1=document.createElement('td');
    const rb=document.createElement('span');
    rb.className='row-type-badge rtb-'+r.type;
    rb.textContent={add:'추가',del:'삭제',mod:'변경',same:'동일'}[r.type];
    td1.appendChild(rb); tr.appendChild(td1);
    allCols.forEach(c=>{
      const td=document.createElement('td');
      const isMod=r.modCols&&r.modCols.includes(c);
      if(isMod) td.className='cell-mod';
      if(r.type==='mod'&&isMod){
        const os=document.createElement('span'); os.className='cell-old'; os.textContent=r.old[c]??'';
        const ns=document.createElement('span'); ns.className='cell-new'; ns.textContent=r.new[c]??'';
        td.appendChild(os); td.appendChild(ns);
      } else {
        td.textContent=String(obj[c]??'');
      }
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  if(rows.length>PAGE_SIZE){
    const tr=document.createElement('tr');
    const td=document.createElement('td'); td.colSpan=allCols.length+2;
    td.style.cssText='text-align:center;padding:12px;color:var(--muted);font-size:12px';
    td.textContent=`... ${rows.length-PAGE_SIZE}행 더 있음 (Excel로 전체 확인)`;
    tr.appendChild(td); tbody.appendChild(tr);
  }
  tbl.appendChild(tbody); tw.appendChild(tbl);

  // clear previous table content only (keep filter bar rebuilt above)
  // Remove old table+filterbar
  while(container.firstChild) container.removeChild(container.firstChild);
  container.appendChild(fb);
  container.appendChild(tw);
}

// ============================================================
//  EXCEL BUILDER
// ============================================================
function buildWorkbook(fileName, diffResult) {
  const wb = XLSX.utils.book_new();
  const { diffRows, allCols, counts, addedCols, removedCols } = diffResult;
  // Summary sheet
  const sumData = [
    ['파일', fileName],
    ['추가', counts.add],
    ['삭제', counts.del],
    ['변경', counts.mod],
    ['동일', counts.same],
    ['추가 컬럼', addedCols.join(', ')],
    ['삭제 컬럼', removedCols.join(', ')]
  ];
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(sumData), '요약');
  // Diff sheet
  const header = ['타입',...allCols];
  const rows = diffResult.diffRows.map(r=>{
    const obj=r.new||r.old||{};
    const row=[{add:'추가',del:'삭제',mod:'변경',same:'동일'}[r.type]];
    allCols.forEach(c=>{
      if(r.type==='mod'&&r.modCols.includes(c)){
        row.push(`[OLD] ${r.old[c]??''} → [NEW] ${r.new[c]??''}`);
      } else { row.push(obj[c]??''); }
    });
    return row;
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([header,...rows]), 'Diff');
  return wb;
}

// ============================================================
//  SINGLE MODE
// ============================================================
function onDragOver(e, id) { e.preventDefault(); document.getElementById(id).classList.add('drag-over'); }
function onDragLeave(id) { document.getElementById(id).classList.remove('drag-over'); }
function onDrop(e, side) {
  e.preventDefault();
  const id = side==='old'?'zone-old':'zone-new';
  document.getElementById(id).classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if(file) loadSingleFile(file, side);
}
function handleFileInput(e, side) { if(e.target.files[0]) loadSingleFile(e.target.files[0], side); }

function loadSingleFile(file, side) {
  if (!isSupported(file.name)) { toast('지원하지 않는 파일 형식입니다.','error'); return; }
  state.single[side] = file;
  const zoneEl = document.getElementById('zone-'+side);
  zoneEl.classList.add('loaded');
  document.getElementById('hint-'+side).style.display='none';
  document.getElementById('info-'+side).innerHTML = `<div class="fname">${file.name}</div><div class="fmeta">${fmtSize(file.size)}</div>`;
  // Make zone click open file picker
  zoneEl.onclick = () => document.getElementById('file-'+side).click();
  checkRunnable();
  toast(`${side.toUpperCase()} 파일 로드: ${file.name}`, 'info');
}

function checkRunnable() {
  document.getElementById('btn-run').disabled = !(state.single.old && state.single.new);
}

async function runDiff() {
  if(!state.single.old || !state.single.new) return;
  const btn = document.getElementById('btn-run');
  btn.disabled = true; btn.textContent = '처리 중...';
  try {
    const [oldRows, newRows] = await Promise.all([
      parseFile(state.single.old),
      parseFile(state.single.new)
    ]);
    const opts = getOptions('');
    const diffResult = computeDiff(oldRows, newRows, opts);
    renderSingleResult(diffResult, opts);
    toast(`Diff 완료 — 추가 ${diffResult.counts.add}, 삭제 ${diffResult.counts.del}, 변경 ${diffResult.counts.mod}`, 'success');
  } catch(err) {
    toast('파일 파싱 오류: '+err.message,'error');
  } finally {
    btn.disabled = false; btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg> Diff 실행';
    checkRunnable();
  }
}

let _singleDiffResult = null;
function renderSingleResult(diffResult, opts) {
  _singleDiffResult = diffResult;
  const r = document.getElementById('result');
  r.innerHTML = '';
  const t1=document.createElement('div'); t1.className='section-title'; t1.textContent='스키마'; r.appendChild(t1);
  renderSchema(diffResult.allCols, diffResult.addedCols, diffResult.removedCols, r);
  const t2=document.createElement('div'); t2.className='section-title'; t2.style.marginTop='16px'; t2.textContent='요약'; r.appendChild(t2);
  renderSummary(diffResult.counts, diffResult.addedCols, diffResult.removedCols, r);
  const hr=document.createElement('hr'); hr.className='divider'; r.appendChild(hr);
  const ar=document.createElement('div'); ar.className='action-row';
  const exbtn=document.createElement('button'); exbtn.className='btn btn-ghost btn-sm';
  exbtn.textContent='Excel 다운로드'; exbtn.onclick=downloadExcel; ar.appendChild(exbtn); r.appendChild(ar);
  const tc=document.createElement('div'); tc.id='table-container'; r.appendChild(tc);
  const opts2=getOptions('');
  tc._filter='all'; tc._search='';
  renderTable(diffResult,opts2,tc);
}

function downloadExcel() {
  if(!_singleDiffResult) return;
  const fn=(state.single.old?.name||'diff')+'_vs_'+(state.single.new?.name||'');
  const wb=buildWorkbook(fn, _singleDiffResult);
  XLSX.writeFile(wb, 'diff_'+Date.now()+'.xlsx');
}

function loadSample() {
  const oldCSV=`id,name,age,city\n1,Alice,30,Seoul\n2,Bob,25,Busan\n3,Charlie,35,Daegu\n4,Diana,28,Incheon`;
  const newCSV=`id,name,age,city,email\n1,Alice,31,Seoul,alice@ex.com\n2,Bob,25,Busan,bob@ex.com\n4,Diana,28,Gwangju,diana@ex.com\n5,Eve,22,Ulsan,eve@ex.com`;
  function csvToFile(str,name){ return new File([str],name,{type:'text/csv'}); }
  loadSingleFile(csvToFile(oldCSV,'sample_old.csv'),'old');
  loadSingleFile(csvToFile(newCSV,'sample_new.csv'),'new');
  toast('샘플 데이터 로드됨','info');
}

function resetAll() {
  state.single.old=null; state.single.new=null;
  _singleDiffResult=null;
  ['old','new'].forEach(s=>{
    const z=document.getElementById('zone-'+s);
    z.classList.remove('loaded');
    z.onclick=()=>document.getElementById('file-'+s).click();
    document.getElementById('hint-'+s).style.display='';
    document.getElementById('info-'+s).innerHTML='';
    document.getElementById('file-'+s).value='';
  });
  document.getElementById('result').innerHTML='';
  checkRunnable();
  toast('초기화 완료','info');
}

// init zone clicks
document.getElementById('zone-old').onclick = () => document.getElementById('file-old').click();
document.getElementById('zone-new').onclick = () => document.getElementById('file-new').click();

// ============================================================
//  FOLDER MODE
// ============================================================
function onFolderDragOver(e, id) { e.preventDefault(); document.getElementById(id).classList.add('drag-over'); }
function onFolderDragLeave(id) { document.getElementById(id).classList.remove('drag-over'); }

async function onFolderDrop(e, side) {
  e.preventDefault();
  const id = side==='old'?'fzone-old':'fzone-new';
  document.getElementById(id).classList.remove('drag-over');
  e.stopPropagation();
  const items = e.dataTransfer.items;
  const files = [];
  async function traverseEntry(entry, path) {
    if (entry.isFile) {
      await new Promise(res=>entry.file(f=>{files.push(f);res();}));
    } else if (entry.isDirectory) {
      await new Promise(res=>{
        const reader=entry.createReader();
        function readBatch(){
          reader.readEntries(async entries=>{
            if(!entries.length){res();return;}
            for(const en of entries) await traverseEntry(en, path+entry.name+'/');
            readBatch();
          });
        }
        readBatch();
      });
    }
  }
  if(items && items.length) {
    const entriesArr = Array.from(items).map(i=>i.webkitGetAsEntry()).filter(Boolean);
    for(const en of entriesArr) await traverseEntry(en,'');
    if(files.length>0) {
      const folderName = entriesArr[0]?.isDirectory ? entriesArr[0].name : (e.dataTransfer.files[0]?.webkitRelativePath?.split('/')[0] || 'dropped');
      applyFolderFiles(side, folderName, files);
      return;
    }
  }
  // Fallback: flat files
  const flatFiles = Array.from(e.dataTransfer.files);
  if(flatFiles.length) {
    const folderName = flatFiles[0].webkitRelativePath?.split('/')[0] || 'dropped';
    applyFolderFiles(side, folderName, flatFiles);
  }
}

function handleFolderInput(e, side) {
  const files = Array.from(e.target.files);
  if(!files.length) return;
  const folderName = files[0].webkitRelativePath ? files[0].webkitRelativePath.split('/')[0] : 'folder';
  applyFolderFiles(side, folderName, files);
}

function applyFolderFiles(side, folderName, files) {
  let list = files;
  let warned = false;
  if(list.length > MAX_FOLDER_FILES) {
    toast(`파일 수가 ${MAX_FOLDER_FILES}개를 초과합니다. 처음 ${MAX_FOLDER_FILES}개만 처리합니다.`, 'warn');
    list = list.slice(0, MAX_FOLDER_FILES);
    warned = true;
  }
  const map = new Map();
  list.forEach(f => { map.set(f.name.toLowerCase(), f); });
  state.folder[side].name = folderName;
  state.folder[side].files = map;
  // Update UI
  const zoneId = side==='old'?'fzone-old':'fzone-new';
  document.getElementById(zoneId).classList.add('loaded');
  document.getElementById('fhint-'+side).style.display='none';
  const sz = totalSize(map);
  document.getElementById('finfo-'+side).innerHTML =
    `<div class="folder-zone-info"><div class="fname">${folderName}</div><div class="fmeta">${map.size}개 파일 &nbsp;·&nbsp; ${fmtSize(sz)}</div></div>`;
  toast(`${side.toUpperCase()} 폴더 로드: ${map.size}개 파일`, 'info');
  // Rebuild pairs if both loaded
  if(state.folder.old.files.size > 0 && state.folder.new.files.size > 0) {
    buildPairs();
  }
}

function buildPairs() {
  const oldMap = state.folder.old.files;
  const newMap = state.folder.new.files;
  const allNames = new Set([...oldMap.keys(), ...newMap.keys()]);
  const pairs = [];
  allNames.forEach(nameLow => {
    const oldFile = oldMap.get(nameLow);
    const newFile = newMap.get(nameLow);
    const displayName = oldFile ? oldFile.name : newFile.name;
    let status = 'pair';
    if (!oldFile) status = 'newonly';
    else if (!newFile) status = 'oldonly';
    pairs.push({ name: displayName, nameLow, oldFile: oldFile||null, newFile: newFile||null, status, diffResult: null, running: false });
  });
  pairs.sort((a,b)=>a.name.localeCompare(b.name,'ko'));
  state.folder.pairs = pairs;
  document.getElementById('folder-pair-section').style.display='';
  renderPairList();
  closeDiffPanel();
}

function getPairOpts() { return getOptions('f'); }

// ---- RENDER PAIR LIST ----
function renderPairList() {
  const search = document.getElementById('pair-search').value.toLowerCase();
  const pairs = state.folder.pairs.filter(p => !search || p.name.toLowerCase().includes(search));

  // Groups
  const paired = pairs.filter(p=>p.status==='pair');
  const oldOnly = pairs.filter(p=>p.status==='oldonly');
  const newOnly = pairs.filter(p=>p.status==='newonly');

  const total = state.folder.pairs.length;
  document.getElementById('pair-list-title').textContent = `파일 쌍 목록 (${total}개)`;

  const container = document.getElementById('pair-list-container');
  container.innerHTML = '';

  if(!pairs.length) {
    container.innerHTML = '<div class="empty-state"><h3>검색 결과 없음</h3></div>';
    return;
  }

  function makeGroup(title, groupPairs, collapsed) {
    const wrap = document.createElement('div');
    wrap.style.marginBottom='12px';
    const gh = document.createElement('div');
    gh.className = 'group-header';
    const arrow = document.createElement('span');
    arrow.textContent = collapsed ? '▶' : '▼';
    arrow.style.fontSize='10px';
    gh.appendChild(arrow);
    const lbl = document.createElement('span');
    lbl.textContent = `${title} (${groupPairs.length})`;
    gh.appendChild(lbl);
    const body = document.createElement('div');
    body.style.display = collapsed ? 'none':'';
    gh.onclick = () => {
      const isCollapsed = body.style.display==='none';
      body.style.display = isCollapsed?'':'none';
      arrow.textContent = isCollapsed?'▼':'▶';
    };
    wrap.appendChild(gh);
    if(groupPairs.length>0){
      const tableWrap=document.createElement('div'); tableWrap.className='pair-table-wrap';
      const tbl=document.createElement('table'); tbl.className='pair-table';
      const thead=document.createElement('thead');
      const htr=document.createElement('tr');
      ['파일명','OLD 크기','NEW 크기','결과','상태','액션'].forEach(h=>{
        const th=document.createElement('th'); th.textContent=h; htr.appendChild(th);
      });
      thead.appendChild(htr); tbl.appendChild(thead);
      const tbody=document.createElement('tbody');
      groupPairs.forEach(pair=>{
        tbody.appendChild(makePairRow(pair));
      });
      tbl.appendChild(tbody); tableWrap.appendChild(tbl); body.appendChild(tableWrap);
    }
    wrap.appendChild(body);
    return wrap;
  }

  if(paired.length) container.appendChild(makeGroup('쌍 (비교 가능)', paired, false));
  if(oldOnly.length) container.appendChild(makeGroup('OLD 폴더에만', oldOnly, oldOnly.length>0 && paired.length>0));
  if(newOnly.length) container.appendChild(makeGroup('NEW 폴더에만', newOnly, newOnly.length>0 && paired.length>0));
}

function makePairRow(pair) {
  const idx = state.folder.pairs.indexOf(pair);
  const tr = document.createElement('tr');
  tr.className = 'pair-row' + (state.activePairIndex===idx?' active-row':'');
  tr.dataset.idx = idx;

  // File name
  const td0=document.createElement('td');
  td0.style.fontWeight='600';
  td0.textContent=pair.name;
  tr.appendChild(td0);

  // OLD size
  const td1=document.createElement('td');
  td1.style.color='var(--muted)';
  td1.textContent=pair.oldFile?fmtSize(pair.oldFile.size):'—';
  tr.appendChild(td1);

  // NEW size
  const td2=document.createElement('td');
  td2.style.color='var(--muted)';
  td2.textContent=pair.newFile?fmtSize(pair.newFile.size):'—';
  tr.appendChild(td2);

  // Result badges
  const td3=document.createElement('td');
  if(pair.diffResult) {
    const mini=document.createElement('div'); mini.className='result-mini';
    const {counts}=pair.diffResult;
    [{k:'add',l:'추가',c:'rm-add'},{k:'del',l:'삭제',c:'rm-del'},{k:'mod',l:'변경',c:'rm-mod'},{k:'same',l:'동일',c:'rm-same'}].forEach(({k,l,c})=>{
      const s=document.createElement('span'); s.className='rm '+c; s.textContent=`${l} ${counts[k]}`; mini.appendChild(s);
    });
    td3.appendChild(mini);
  } else if(pair.running){
    const sp=document.createElement('span'); sp.className='spinner'; td3.appendChild(sp);
  } else {
    td3.textContent='—';
  }
  tr.appendChild(td3);

  // Status
  const td4=document.createElement('td');
  const sb=document.createElement('span');
  const sup=isSupported(pair.name);
  if(!sup){
    sb.className='status-badge sb-unsupported'; sb.textContent='지원 안함';
  } else if(pair.status==='pair'){
    sb.className='status-badge sb-pair'; sb.textContent='쌍';
  } else if(pair.status==='oldonly'){
    sb.className='status-badge sb-oldonly'; sb.textContent='OLD only';
  } else {
    sb.className='status-badge sb-newonly'; sb.textContent='NEW only';
  }
  td4.appendChild(sb); tr.appendChild(td4);

  // Actions
  const td5=document.createElement('td');
  td5.style.whiteSpace='nowrap';
  if(pair.status==='pair' && sup) {
    const cb=document.createElement('button');
    cb.className='btn btn-accent btn-sm'; cb.textContent='비교';
    cb.style.marginRight='6px';
    cb.onclick=(e)=>{ e.stopPropagation(); runPairDiff(idx, true); };
    td5.appendChild(cb);
    if(pair.diffResult) {
      const eb=document.createElement('button');
      eb.className='btn btn-ghost btn-sm'; eb.textContent='Excel';
      eb.onclick=(e)=>{ e.stopPropagation(); downloadPairExcelById(idx); };
      td5.appendChild(eb);
    }
  } else {
    td5.textContent='—';
  }
  tr.appendChild(td5);

  tr.onclick = () => {
    if(pair.status==='pair' && isSupported(pair.name)) {
      if(pair.diffResult) { showDiffPanel(idx); }
      else { runPairDiff(idx, true); }
    }
  };

  return tr;
}

// ---- RUN SINGLE PAIR DIFF ----
async function runPairDiff(idx, showPanel) {
  const pair = state.folder.pairs[idx];
  if(!pair || !pair.oldFile || !pair.newFile) return;
  pair.running=true;
  renderPairList();
  try {
    const [oldRows,newRows] = await Promise.all([parseFile(pair.oldFile), parseFile(pair.newFile)]);
    const opts = getPairOpts();
    pair.diffResult = computeDiff(oldRows, newRows, opts);
    pair.running = false;
    renderPairList();
    if(showPanel) showDiffPanel(idx);
  } catch(err) {
    pair.running=false;
    toast('파싱 오류 ('+pair.name+'): '+err.message,'error');
    renderPairList();
  }
}

// ---- RUN ALL ----
async function runAllDiffs() {
  const pairs = state.folder.pairs.filter(p=>p.status==='pair'&&isSupported(p.name));
  if(!pairs.length){ toast('비교 가능한 쌍이 없습니다.','warn'); return; }
  document.getElementById('folder-progress').style.display='';
  document.getElementById('btn-run-all').disabled=true;
  const total=pairs.length;
  for(let i=0;i<total;i++){
    const pair=pairs[i];
    document.getElementById('progress-text').textContent=`${i+1} / ${total} 비교 중... (${pair.name})`;
    document.getElementById('progress-fill').style.width=((i/total)*100)+'%';
    await runPairDiff(state.folder.pairs.indexOf(pair), false);
    await new Promise(r=>setTimeout(r,0)); // yield
  }
  document.getElementById('progress-fill').style.width='100%';
  document.getElementById('progress-text').textContent=`전체 ${total}쌍 비교 완료`;
  setTimeout(()=>document.getElementById('folder-progress').style.display='none',2000);
  document.getElementById('btn-run-all').disabled=false;
  renderPairList();
  toast(`전체 ${total}쌍 비교 완료`, 'success');
}

// ---- SHOW DIFF PANEL ----
function showDiffPanel(idx) {
  state.activePairIndex = idx;
  const pair = state.folder.pairs[idx];
  renderPairList();
  document.getElementById('folder-diff-panel').style.display='';
  document.getElementById('folder-diff-panel').scrollIntoView({behavior:'smooth',block:'nearest'});
  document.getElementById('diff-panel-title').textContent = pair.name;
  document.getElementById('btn-prev-pair').disabled = idx<=0;
  document.getElementById('btn-next-pair').disabled = idx>=state.folder.pairs.length-1;

  const container = document.getElementById('folder-diff-result');
  container.innerHTML='';
  if(!pair.diffResult){ container.innerHTML='<div class="empty-state"><h3>먼저 비교를 실행하세요</h3></div>'; return; }

  const t1=document.createElement('div'); t1.className='section-title'; t1.textContent='스키마'; container.appendChild(t1);
  renderSchema(pair.diffResult.allCols, pair.diffResult.addedCols, pair.diffResult.removedCols, container);
  const t2=document.createElement('div'); t2.className='section-title'; t2.style.marginTop='16px'; t2.textContent='요약'; container.appendChild(t2);
  renderSummary(pair.diffResult.counts, pair.diffResult.addedCols, pair.diffResult.removedCols, container);
  const hr=document.createElement('hr'); hr.className='divider'; container.appendChild(hr);
  const tc=document.createElement('div'); container.appendChild(tc);
  tc._filter='all'; tc._search='';
  renderTable(pair.diffResult, getPairOpts(), tc);
}

function closeDiffPanel() {
  state.activePairIndex=-1;
  document.getElementById('folder-diff-panel').style.display='none';
  renderPairList();
}

function navigatePair(dir) {
  const pairs = state.folder.pairs;
  const canDiff = idx => pairs[idx] && pairs[idx].status==='pair' && isSupported(pairs[idx].name);
  let next = state.activePairIndex + dir;
  while(next>=0 && next<pairs.length && !canDiff(next)) next+=dir;
  if(next<0||next>=pairs.length) return;
  if(pairs[next].diffResult) showDiffPanel(next);
  else runPairDiff(next,true);
}

// ---- EXCEL DOWNLOADS ----
function downloadPairExcel() { downloadPairExcelById(state.activePairIndex); }
function downloadPairExcelById(idx) {
  const pair = state.folder.pairs[idx];
  if(!pair||!pair.diffResult){toast('먼저 비교를 실행하세요','warn');return;}
  const wb=buildWorkbook(pair.name,pair.diffResult);
  XLSX.writeFile(wb,'diff_'+pair.name.replace(/\.\w+$/,'')+'_'+Date.now()+'.xlsx');
}

function downloadAllExcel() {
  const diffs=state.folder.pairs.filter(p=>p.diffResult);
  if(!diffs.length){toast('비교된 결과가 없습니다. 먼저 비교를 실행하세요.','warn');return;}
  const wb=XLSX.utils.book_new();
  const usedNames=new Set();
  // 요약 sheet
  const sumRows=[['파일명','OLD 행수','NEW 행수','추가','삭제','변경','동일','추가 컬럼','삭제 컬럼']];
  diffs.forEach(p=>{
    const dr=p.diffResult;
    const total=v=>dr.counts[v];
    const oldRows=total('del')+total('mod')+total('same');
    const newRows=total('add')+total('mod')+total('same');
    sumRows.push([p.name,oldRows,newRows,total('add'),total('del'),total('mod'),total('same'),dr.addedCols.join(', '),dr.removedCols.join(', ')]);
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(sumRows),'요약');
  usedNames.add('요약');
  // Per-pair sheets
  diffs.forEach(p=>{
    const baseName=sanitizeSheetName(p.name.replace(/\.\w+$/,''));
    const sheetName=dedupeSheetName(baseName,usedNames);
    const dr=p.diffResult;
    const header=['타입',...dr.allCols];
    const rows=dr.diffRows.map(r=>{
      const obj=r.new||r.old||{};
      const row=[{add:'추가',del:'삭제',mod:'변경',same:'동일'}[r.type]];
      dr.allCols.forEach(c=>{
        if(r.type==='mod'&&r.modCols.includes(c)) row.push(`[OLD] ${r.old[c]??''} → [NEW] ${r.new[c]??''}`);
        else row.push(obj[c]??'');
      });
      return row;
    });
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([header,...rows]),sheetName);
  });
  XLSX.writeFile(wb,'folder_diff_'+Date.now()+'.xlsx');
  toast(`전체 Excel 다운로드: ${diffs.length}개 시트`,'success');
}

function resetFolder() {
  state.folder={old:{name:'',files:new Map()},new:{name:'',files:new Map()},pairs:[]};
  state.activePairIndex=-1;
  ['old','new'].forEach(s=>{
    const zid='fzone-'+s;
    document.getElementById(zid).classList.remove('loaded');
    document.getElementById('fhint-'+s).style.display='';
    document.getElementById('finfo-'+s).innerHTML='';
    document.getElementById('ffile-'+s).value='';
  });
  document.getElementById('folder-pair-section').style.display='none';
  document.getElementById('pair-list-container').innerHTML='';
  document.getElementById('folder-diff-panel').style.display='none';
  document.getElementById('folder-diff-result').innerHTML='';
  document.getElementById('folder-progress').style.display='none';
  toast('폴더 모드 초기화 완료','info');
}

// prevent zone click when file input fires (avoid double trigger)
document.getElementById('ffile-old').addEventListener('click',e=>e.stopPropagation());
document.getElementById('ffile-new').addEventListener('click',e=>e.stopPropagation());
</script>
